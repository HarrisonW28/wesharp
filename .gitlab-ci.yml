# WeSharp — GitLab CI (Sprint 11.6)
# Requires a GitLab runner with Docker or Kubernetes executor.
# Extend with deploy jobs and environment-scoped variables in GitLab.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_BRANCH == "develop"
    - if: $CI_COMMIT_BRANCH == "staging"

stages:
  - test
  - deploy

variables:
  COMPOSER_ALLOW_SUPERUSER: "1"

# ---------------------------------------------------------------------------
# Deploy — staging only (requires GitLab CI/CD variables; see docs)
# ---------------------------------------------------------------------------
.deploy-staging-ssh:
  stage: deploy
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "staging"
  before_script:
    - apk add --no-cache openssh-client bash curl
    - mkdir -p ~/.ssh
    - echo "$STAGING_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$STAGING_SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
  script:
    - |
      ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=accept-new \
        "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" \
        "export WESHARP_APP_ROOT='${STAGING_APP_ROOT}'; \
         export WESHARP_DEPLOY_ENV_FILE='${STAGING_DEPLOY_ENV_FILE:-/etc/wesharp/staging-deploy.env}'; \
         bash \"\${WESHARP_APP_ROOT}/scripts/deploy/plesk-staging.sh\""
    - curl -fsS "${STAGING_API_URL:-https://api-staging.wesharp.co.uk}/api/health" | grep -q ok

deploy:staging:
  extends: .deploy-staging-ssh
  needs:
    - backend:test
    - frontend:quality
  environment:
    name: staging
    url: https://staging.wesharp.co.uk

.test-backend:
  image: php:8.4-cli-bookworm
  stage: test
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends git unzip libzip-dev sqlite3 libsqlite3-dev
    - rm -rf /var/lib/apt/lists/*
    - docker-php-ext-install -j"$(nproc)" zip pdo_sqlite
    - curl -fsSL https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - cd apps/backend && composer install --no-interaction --prefer-dist --no-progress
  cache:
    key: "${CI_COMMIT_REF_SLUG}-composer-backend"
    paths:
      - apps/backend/vendor/

backend:test:
  extends: .test-backend
  script:
    - cd apps/backend && php artisan test

.test-frontend:
  image: node:22-bookworm
  stage: test
  before_script:
    - cd apps/frontend && npm ci
  cache:
    key: "${CI_COMMIT_REF_SLUG}-npm-frontend"
    paths:
      - apps/frontend/node_modules/

frontend:quality:
  extends: .test-frontend
  script:
    - cd apps/frontend && npm run typecheck
    - cd apps/frontend && npm run lint
