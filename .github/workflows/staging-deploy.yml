name: Staging deploy (Plesk)

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: false

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: zip, pdo_sqlite
          coverage: none
      - run: composer install --no-interaction --prefer-dist --no-progress
      - run: php artisan test

  frontend-quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - name: Build
        env:
          NEXT_PUBLIC_API_ORIGIN: https://api-staging.wesharp.co.uk
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_YWFhLWJiYi0xMi5jbGVyay5hY2NvdW50cy5kZXYk
        run: npm run build

  deploy:
    name: Deploy to Plesk staging
    needs: [backend-test, frontend-quality]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Skip when staging SSH secrets are not configured
        id: deploy_gate
        env:
          STAGING_SSH_HOST: ${{ secrets.STAGING_SSH_HOST }}
          STAGING_SSH_USER: ${{ secrets.STAGING_SSH_USER }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_APP_ROOT: ${{ secrets.STAGING_APP_ROOT }}
        run: |
          if [ -z "$STAGING_SSH_HOST" ] || [ -z "$STAGING_SSH_USER" ] || [ -z "$STAGING_SSH_PRIVATE_KEY" ] || [ -z "$STAGING_APP_ROOT" ]; then
            echo "Staging deploy secrets are not configured — skipping SSH deploy."
            echo "See docs/operations/staging-plesk-deployment.md"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy over SSH
        if: steps.deploy_gate.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          port: ${{ secrets.STAGING_SSH_PORT }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail
            export WESHARP_APP_ROOT="${{ secrets.STAGING_APP_ROOT }}"
            export WESHARP_DEPLOY_ENV_FILE="${{ secrets.STAGING_DEPLOY_ENV_FILE }}"
            if [ -z "${WESHARP_DEPLOY_ENV_FILE}" ]; then
              export WESHARP_DEPLOY_ENV_FILE="/etc/wesharp/staging-deploy.env"
            fi
            bash "${WESHARP_APP_ROOT}/scripts/deploy/plesk-staging.sh"

  smoke:
    name: Post-deploy smoke (external)
    needs: deploy
    if: needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: API health
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          API_URL="${STAGING_API_URL:-https://api-staging.wesharp.co.uk}"
          curl -fsS "${API_URL}/api/health" | tee /tmp/health.json
          grep -q '"success"' /tmp/health.json
          grep -q 'ok' /tmp/health.json

      - name: Frontend homepage
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        run: |
          FRONTEND_URL="${STAGING_FRONTEND_URL:-https://staging.wesharp.co.uk}"
          code=$(curl -fsS -o /dev/null -w '%{http_code}' "${FRONTEND_URL}/")
          test "$code" = "200"

      - name: Manchester area page
        env:
          STAGING_FRONTEND_URL: ${{ vars.STAGING_FRONTEND_URL }}
        run: |
          FRONTEND_URL="${STAGING_FRONTEND_URL:-https://staging.wesharp.co.uk}"
          code=$(curl -fsS -o /dev/null -w '%{http_code}' "${FRONTEND_URL}/service-areas/manchester")
          test "$code" = "200"
