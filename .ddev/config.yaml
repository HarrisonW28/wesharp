name: wesharp
type: php
docroot: web
webserver_type: nginx-fpm
php_version: "8.3"
nodejs_version: "20"
omit_containers:
  - db
hooks:
  post-start:
    # DDEV resets nginx-site.conf; template lives outside nginx_full/ (only *.conf there become extra vhosts).
    - exec: >-
        bash -lc 'set -euo pipefail; cp /mnt/ddev_config/nginx-site.next.template /mnt/ddev_config/nginx_full/nginx-site.conf && nginx -t && nginx -s reload'
# Smoother Next dev memory in Docker (exit 137 = OOM / SIGKILL)
web_environment:
  - NODE_OPTIONS=--max-old-space-size=3072
# Mutagen: this stack has no CMS-style uploaded files; silence the generic PHP warning.
disable_upload_dirs_warning: true
# If `ddev start` fails with "port 443 is already in use", stop the other listener
# (e.g. `sudo lsof -i :443`) or move the router to a free port and use that in URLs:
# router_https_port: "8443"
web_extra_exposed_ports:
  - name: nextjs
    container_port: 3000
    http_port: 3000
    https_port: 3443
